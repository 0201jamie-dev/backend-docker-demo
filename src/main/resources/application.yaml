server:
  port: 9090

spring:
  application:
    name: docker-demo-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${MARIADB_USER}
    password:
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT}